<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" fill="none">
  <!-- Double circle border -->
  <circle cx="200" cy="200" r="185" stroke="white" stroke-width="2.5" fill="none"/>
  <circle cx="200" cy="200" r="175" stroke="white" stroke-width="1.5" fill="none"/>

  <!-- "fy" monogram -->
  <text
    x="200" y="245"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="190"
    font-style="italic"
    font-weight="400"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-10"
  >fy</text>

  <!-- "FYRNYS" wordmark -->
  <text
    x="200" y="440"
    font-family="'Gill Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="58"
    font-weight="600"
    fill="white"
